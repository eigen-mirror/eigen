    EIGEN_CI_INSTALL: clang-19 llvm-19
    ASAN_OPTIONS: detect_leaks=0:print_stacktrace=1
    UBSAN_OPTIONS: print_stacktrace=1
    ASAN_SYMBOLIZER_PATH: /usr/lib/llvm-19/bin/llvm-symbolizer
    EIGEN_CI_CTEST_ARGS: --timeout 2000

